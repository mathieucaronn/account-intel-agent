name: Refresh dashboard

on:
  schedule:
    - cron: "0 6 * * *" # tous les jours à 6h UTC
  workflow_dispatch: {} # déclenchement manuel possible depuis l'onglet Actions

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Régénère le dashboard
        run: python -m account_intel --out docs/index.html
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          # "fr" (par défaut) ou "en" — dashboard entièrement dans une langue
          # ou l'autre. Se configure dans Settings → Secrets and variables →
          # Actions → Variables (pas un secret, pas sensible).
          DEFAULT_LANG: ${{ vars.DEFAULT_LANG }}

      - name: Publie si le contenu a changé
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet && echo "Rien de nouveau." || git commit -m "Rafraîchit le dashboard (auto)"
          git push
