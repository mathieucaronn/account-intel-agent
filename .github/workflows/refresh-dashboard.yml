name: Refresh dashboard

on:
  schedule:
    - cron: "0 6 * * *" # tous les jours à 6h UTC
  workflow_dispatch: {} # déclenchement manuel possible depuis l'onglet Actions

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # requirements-ai.txt (paquet 'anthropic') installé systématiquement :
      # léger, et permet au résumé croisé par IA de s'activer automatiquement
      # dès que le secret ANTHROPIC_API_KEY est renseigné, sans retoucher ce
      # fichier.
      - run: pip install -r requirements.txt -r requirements-ai.txt

      - name: Régénère le dashboard
        run: python -m account_intel --out docs/index.html
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          # Optionnel : active un résumé du jour croisant presse/communiqués/
          # réseaux sociaux via Claude (sinon repli automatique sur le résumé
          # Tavily). Settings → Secrets and variables → Actions → Secrets.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Langue affichée par défaut à l'ouverture ("fr" ou "en") — un
          # bouton sur la page permet de toute façon de basculer à tout
          # moment, les deux langues sont toujours générées. Settings →
          # Secrets and variables → Actions → Variables (pas un secret).
          DEFAULT_LANG: ${{ vars.DEFAULT_LANG }}

      - name: Publie si le contenu a changé
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet && echo "Rien de nouveau." || git commit -m "Rafraîchit le dashboard (auto)"
          git push
